name: GateKeeper CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Run Tests
      run: |
        go mod tidy
        go test -v -race ./...

    - name: Build Gateway Docker Image
      run: docker build -f deploy/gateway.Dockerfile -t gatekeeper-gateway:latest .

    - name: Build Consumer Docker Image
      run: docker build -f deploy/consumer.Dockerfile -t gatekeeper-consumer:latest .
